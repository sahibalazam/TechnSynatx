<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Technsyntax</title>
  <link rel="icon" href="../assets/favicon.ico">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
<meta name="description" content="Have a project in mind or want to join the academy? Contact Technsyntax today. Let's build together.">
<meta name="keywords" content="contact Technsyntax, hire developers, web dev agency contact, tech academy enrollment">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://technsyntax.site/pages/contact.html">

<meta property="og:type" content="website">
<meta property="og:url" content="https://technsyntax.site/pages/contact.html">
<meta property="og:title" content="Contact Us | Technsyntax">
<meta property="og:description" content="Have a project in mind or want to join the academy? Drop us a line. We respond within 24 hours.">
<meta property="og:image" content="https://technsyntax.site/assets/contact-og.jpg">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:url" content="https://technsyntax.site/pages/contact.html">
<meta name="twitter:title" content="Contact Us | Technsyntax">
<meta name="twitter:description" content="Have a project in mind or want to join the academy? Drop us a line. We respond within 24 hours.">
<meta name="twitter:image" content="https://technsyntax.site/assets/contact-og.jpg">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ContactPage",
  "name": "Contact Technsyntax",
  "url": "https://technsyntax.site/pages/contact.html",
  "mainEntity": {
    "@type": "LocalBusiness",
    "name": "Technsyntax",
    "telephone": "+918451902405",
    "email": "connect@technsyntax.com",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Malad West",
      "addressLocality": "Mumbai"
    }
  }
}
</script>

</head>
<body>
  <div id="header-placeholder"></div>

  <div class="page-header">
    <div class="container">
      <h1>Let's Build Together</h1>
      <p>Have a project in mind or want to join the academy? Drop us a line.</p>
    </div>
  </div>

  <section class="py-5 container">
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem;">
      
      <div>
        <div class="card mb-4">
          <h3 style="margin-bottom: 1rem;">Contact Info</h3>
          <p style="margin-bottom: 1rem;">
            <strong style="color: var(--primary);">Email:</strong><br> 
            <a href="mailto: connect@technsyntax.com" style="color: var(--accent); text-decoration: none;">connect@technsyntax.com</a>
          </p>
          <p style="margin-bottom: 1rem;">
            <strong style="color: var(--primary);">Phone:</strong><br> 
            +918451902405
          </p>
          <p>
            <strong style="color: var(--primary);">Location:</strong><br> 
            Mumbai 
          </p>
        </div>
        <div class="card" style="background: var(--primary); color: var(--white);">
          <h3 style="color: var(--white); margin-bottom: 0.5rem;">Ready to Hire Us?</h3>
          <p style="font-size: 0.9rem; color: #cbd5e1;">We respond to all business inquiries and project proposals within 24 hours.</p>
        </div>
      </div>

      <div class="card">
        <h2 style="color: var(--primary); margin-bottom: 1.5rem;">Send a Message</h2>
        <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Form submitted successfully!');">
          
          <div style="margin-bottom: 1.2rem;">
            <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Full Name</label>
            <input type="text" id="name" required placeholder="John Doe" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius); font-family: inherit; font-size: 1rem; outline: none;">
          </div>

          <div style="margin-bottom: 1.2rem;">
            <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
            <input type="email" id="email" required placeholder="john@example.com" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius); font-family: inherit; font-size: 1rem; outline: none;">
          </div>

          <div style="margin-bottom: 1.2rem;">
            <label for="subject" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Subject</label>
            <select id="subject" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius); font-family: inherit; font-size: 1rem; background: white; outline: none;">
              <option value="academy">Academy Inquiry</option>
              <option value="services">Business/Services Project</option>
              <option value="general">General Question</option>
            </select>
          </div>

          <div style="margin-bottom: 1.5rem;">
            <label for="message" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Message</label>
            <textarea id="message" rows="4" required placeholder="How can we help you?" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: var(--radius); font-family: inherit; font-size: 1rem; outline: none; resize: vertical;"></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
        </form>
      </div>

    </div>
  </section>

  <div id="footer-placeholder"></div>

<script>
  // Yahan apna copied URL paste karein
  const scriptURL = 'https://script.google.com/macros/s/AKfycbw0N7DCe3rP3FDAyyQN-P1Wg7Pjcj8yEmQXX8htaf5AjaShgCluSW7EbN7sAVXDPN0H2A/exec';
  const form = document.querySelector('form');

  form.addEventListener('submit', e => {
    e.preventDefault();
    
    // IDs ke zariye data collect karna (CSS safe rahega)
    const payload = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      subject: document.getElementById('subject').value,
      message: document.getElementById('message').value
    };

    fetch(scriptURL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    })
    .then(() => {
      alert('Message successfully sent to Google Sheet!');
      form.reset(); // Form clear ho jayega
    })
    .catch(error => console.error('Error!', error.message));
  });
</script>

  <script src="../js/components.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/animations.js"></script>
</body>
</html>
